name: CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/idle-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/idle-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace idle-coder build

    - name: Pack package
      run: yarn workspace idle-coder pack

    - name: Install packed package globally
      run: |
        PACKAGE_FILE=$(ls packages/idle-cli/*.tgz)
        npm install -g "./$PACKAGE_FILE"

    - name: Test binary execution
      run: |
        # Test that the binary starts successfully
        echo "Testing idle --help..."
        timeout 30s idle --help || {
          echo "Error: idle --help failed or timed out"
          exit 1
        }

        echo "Testing idle --version..."
        timeout 10s idle --version || {
          echo "Error: idle --version failed or timed out"
          exit 1
        }

        echo "Testing idle doctor..."
        timeout 30s idle doctor || {
          echo "Error: idle doctor failed or timed out"
          exit 1
        }

        echo "Testing idle daemon status..."
        timeout 10s idle daemon status || {
          echo "Error: idle daemon status failed or timed out"
          exit 1
        }

        echo "Smoke test passed on Linux!"

  smoke-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace idle-coder build

    - name: Pack package
      run: yarn workspace idle-coder pack

    - name: Install packed package globally
      shell: cmd
      run: |
        for %%f in (packages\idle-cli\*.tgz) do npm install -g "%%f"

    - name: Debug npm global installation structure
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Listing npm prefix directory:
        dir "%NPM_PREFIX%" 2>nul || echo Failed to list NPM_PREFIX
        echo.
        echo Checking for node_modules in npm prefix:
        if exist "%NPM_PREFIX%\node_modules" (
          echo Found node_modules directory
          dir "%NPM_PREFIX%\node_modules" 2>nul
          echo.
          echo Checking for idle-coder package:
          if exist "%NPM_PREFIX%\node_modules\idle-coder" (
            echo Found idle-coder package
            dir "%NPM_PREFIX%\node_modules\idle-coder" 2>nul
            echo.
            echo Checking for dist directory:
            if exist "%NPM_PREFIX%\node_modules\idle-coder\dist" (
              echo Found dist directory
              dir "%NPM_PREFIX%\node_modules\idle-coder\dist" 2>nul
            ) else (
              echo No dist directory found
            )
          ) else (
            echo idle-coder package not found
          )
        ) else (
          echo node_modules directory not found
        )

    - name: Test binary execution
      shell: cmd
      run: |
        @echo on

        rem Get npm global prefix and add to PATH
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        set PATH=%NPM_PREFIX%;%PATH%
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Current PATH: %PATH%

        rem Debug: Check if idle exists in various locations
        echo Checking for idle binary...
        where idle 2>nul && echo Found idle in PATH || echo idle not found in PATH
        if exist "%NPM_PREFIX%\idle.cmd" echo Found idle.cmd in NPM_PREFIX
        if exist "%NPM_PREFIX%\node_modules\.bin\idle.cmd" echo Found idle.cmd in .bin directory
        dir "%NPM_PREFIX%\*idle*" 2>nul || echo No idle files found in NPM_PREFIX

        rem Debug: Check the actual contents and encoding of the installed file
        if exist "%NPM_PREFIX%\idle.cmd" (
          echo File size and type:
          dir "%NPM_PREFIX%\idle.cmd"
          echo.
          echo First few lines of the file:
          type "%NPM_PREFIX%\idle.cmd" | head -5
          echo.
          echo Hex dump of first 50 bytes to check line endings:
          powershell -Command "Get-Content '%NPM_PREFIX%\idle.cmd' -Encoding Byte -TotalCount 50 | ForEach-Object { '{0:X2}' -f $_ } | Join-String -Separator ' '"
          echo.
          echo Testing with direct path...
          "%NPM_PREFIX%\idle.cmd" --help
        ) else (
          echo Testing idle --help...
          idle --help
        )
        if errorlevel 1 (
          echo Error: idle --help failed
          exit /b 1
        )

        rem Test version
        if exist "%NPM_PREFIX%\idle.cmd" (
          "%NPM_PREFIX%\idle.cmd" --version
        ) else (
          idle --version
        )
        if errorlevel 1 (
          echo Error: idle --version failed
          exit /b 1
        )

        rem Test doctor
        echo Testing idle doctor...
        if exist "%NPM_PREFIX%\idle.cmd" (
          "%NPM_PREFIX%\idle.cmd" doctor
        ) else (
          idle doctor
        )
        if errorlevel 1 (
          echo Error: idle doctor failed
          exit /b 1
        )

        rem Test daemon status
        echo Testing idle daemon status...
        if exist "%NPM_PREFIX%\idle.cmd" (
          "%NPM_PREFIX%\idle.cmd" daemon status
        ) else (
          idle daemon status
        )
        if errorlevel 1 (
          echo Error: idle daemon status failed
          exit /b 1
        )

        echo Smoke test passed on Windows!

# We don't need a smoke test for macOS because most contributors are developing on macOS.
