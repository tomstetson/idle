name: Deploy Web App

on:
  push:
    branches: [main]
    paths:
      - 'packages/idle-app/**'
      - 'packages/idle-wire/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:

concurrency:
  group: deploy-webapp
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build idle-wire (shared types)
        run: yarn workspace @northglass/idle-wire build

      - name: Build web app
        run: |
          cd packages/idle-app
          rm -rf dist
          APP_ENV=production EXPO_NO_METRO_WORKSPACE_ROOT=1 npx expo export --platform web --output-dir dist

      - name: Inject PWA meta tags
        run: |
          cd packages/idle-app/dist
          sed -i 's|</head>|<meta name="apple-mobile-web-app-capable" content="yes" /><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" /><meta name="apple-mobile-web-app-title" content="Idle" /><meta name="theme-color" content="#18171C" /><link rel="apple-touch-icon" href="/apple-touch-icon.png" /><link rel="manifest" href="/manifest.json" /></head>|' index.html

      - name: Package and deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "Transferring build..."
          tar czf - -C packages/idle-app/dist . | \
            ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" '
              set -euo pipefail
              DEPLOY_DIR=/var/www/idle-app
              TEMP_DIR=$(mktemp -d)
              tar xzf - -C "$TEMP_DIR"
              rm -rf "${DEPLOY_DIR}.old"
              mv "$DEPLOY_DIR" "${DEPLOY_DIR}.old"
              mv "$TEMP_DIR" "$DEPLOY_DIR"
              rm -rf "${DEPLOY_DIR}.old"
              echo "Webapp deploy successful!"
            '

          rm -f ~/.ssh/deploy_key
