name: Test All Packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build idle-wire
        run: yarn workspace @northglass/idle-wire build

      - name: Test idle-wire
        run: yarn workspace @northglass/idle-wire test

  test-server:
    needs: test-wire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build idle-wire (shared types)
        run: yarn workspace @northglass/idle-wire build

      - name: Test server
        run: yarn workspace idle-server test

  test-cli:
    needs: test-wire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build idle-wire (shared types)
        run: yarn workspace @northglass/idle-wire build

      - name: Build CLI
        run: yarn workspace idle-coder build

      - name: Test CLI
        run: yarn workspace idle-coder test

  test-app:
    needs: test-wire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build idle-wire (shared types)
        run: yarn workspace @northglass/idle-wire build

      - name: Test app
        run: yarn workspace idle-app test

  test-agent:
    needs: test-wire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: yarn.lock

      - run: yarn install --immutable

      - name: Build idle-wire (shared types)
        run: yarn workspace @northglass/idle-wire build

      - name: Test agent
        run: yarn workspace @northglass/agent test
